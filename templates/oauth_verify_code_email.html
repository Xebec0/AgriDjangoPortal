<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f7f6;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;margin:30px auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden;">
        <tr>
            <td style="background:linear-gradient(135deg,#28a745 0%,#1e7e34 100%);padding:28px 30px;text-align:center;">
                <h1 style="margin:0;color:#fff;font-size:22px;font-weight:700;">AgroStudies</h1>
                <p style="margin:6px 0 0;color:rgba(255,255,255,0.85);font-size:13px;">Email Verification</p>
            </td>
        </tr>
        <tr>
            <td style="padding:32px 30px 24px;">
                <p style="margin:0 0 12px;font-size:16px;color:#333;">Hi {{ first_name }},</p>
                <p style="margin:0 0 24px;font-size:14px;color:#555;line-height:1.6;">
                    You're almost there! Use the verification code below to complete your AgroStudies account setup.
                </p>
                <div style="text-align:center;margin:0 0 24px;">
                    <div style="display:inline-block;background:#f0f7f2;border:2px dashed #28a745;border-radius:10px;padding:16px 36px;letter-spacing:10px;font-size:32px;font-weight:700;color:#1e7e34;">
                        {{ code }}
                    </div>
                </div>
                <p style="margin:0 0 8px;font-size:13px;color:#888;text-align:center;">
                    This code will expire in <strong>10 minutes</strong>.
                </p>
                <p style="margin:0;font-size:13px;color:#888;text-align:center;">
                    If you did not request this, please ignore this email.
                </p>
            </td>
        </tr>
        <tr>
            <td style="background:#f8faf8;padding:16px 30px;text-align:center;border-top:1px solid #eee;">
                <p style="margin:0;font-size:12px;color:#aaa;">&copy; AgroStudies Registration System</p>
            </td>
        </tr>
    </table>
</body>
</html>
